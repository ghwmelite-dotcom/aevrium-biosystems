<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aevrium Biosystems — Aevrium Select for IVF-lab confidence">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#081525"/>
      <stop offset="1" stop-color="#050c16"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.15" cy="0.05" r="0.5">
      <stop offset="0" stop-color="#66c8ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#66c8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.9" cy="0.0" r="0.45">
      <stop offset="0" stop-color="#94e2b2" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#94e2b2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- mark -->
  <g transform="translate(90,86)">
    <rect width="86" height="86" rx="22" fill="none" stroke="#66c8ff" stroke-opacity="0.35"/>
    <g transform="translate(11,11) scale(1.0)">
      <path d="M32 8.5C42.6 8.5 51.2 17.1 51.2 27.7C51.2 42.4 32 56.5 32 56.5C32 56.5 12.8 42.4 12.8 27.7C12.8 17.1 21.4 8.5 32 8.5Z" stroke="#66c8ff" stroke-width="3.6" fill="none"/>
      <path d="M23 30.6C27.8 20.2 37.4 20.1 41.3 25.9C45.8 32.5 37.8 41.8 26.4 41.8" stroke="#94e2b2" stroke-width="3.6" stroke-linecap="round" fill="none"/>
      <circle cx="31.8" cy="31.8" r="4.2" fill="#d8b36a"/>
    </g>
  </g>
  <text x="196" y="124" font-family="Inter, sans-serif" font-size="26" font-weight="800" letter-spacing="3" fill="#eef4fb">AEVRIUM BIOSYSTEMS</text>
  <text x="196" y="156" font-family="JetBrains Mono, monospace" font-size="17" letter-spacing="2" fill="#7f90a7">A FAREBAN OPERATING COMPANY</text>

  <!-- headline -->
  <text x="90" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="600" fill="#eef4fb">Aevrium Select for</text>
  <text x="90" y="408" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="600" font-style="italic" fill="#bfe9ff">IVF-lab confidence.</text>

  <text x="90" y="470" font-family="Inter, sans-serif" font-size="26" fill="#aab9cc">A consumables-led reproductive microfluidics wedge.</text>

  <!-- pills -->
  <g font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">
    <rect x="90" y="512" width="232" height="50" rx="25" fill="none" stroke="#66c8ff" stroke-opacity="0.4"/>
    <text x="116" y="544" fill="#bfe9ff">$4M seed round</text>
    <rect x="338" y="512" width="270" height="50" rx="25" fill="none" stroke="#94e2b2" stroke-opacity="0.4"/>
    <text x="364" y="544" fill="#94e2b2">12 mo to pilot-ready</text>
    <rect x="624" y="512" width="240" height="50" rx="25" fill="none" stroke="#d8b36a" stroke-opacity="0.45"/>
    <text x="650" y="544" fill="#f3d596">Patent-pending</text>
  </g>

  <!-- motif -->
  <g transform="translate(880,210)" fill="none">
    <path d="M0 0 H170" stroke="#66c8ff" stroke-width="3" stroke-opacity="0.8"/>
    <path d="M0 50 H170" stroke="#66c8ff" stroke-width="3" stroke-opacity="0.5"/>
    <path d="M0 100 H100" stroke="#ffffff" stroke-width="2" stroke-opacity="0.18"/>
    <path d="M170 0 C210 0 210 50 240 50" stroke="#94e2b2" stroke-width="3"/>
    <path d="M170 50 H240" stroke="#94e2b2" stroke-width="3"/>
    <circle cx="240" cy="50" r="13" fill="#94e2b2" fill-opacity="0.15" stroke="#94e2b2" stroke-width="3"/>
