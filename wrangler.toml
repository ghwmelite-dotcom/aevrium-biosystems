name = "aevrium-biosystems"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Serve the static site from /public and expose it to the Worker as `ASSETS`.
# Static assets are served first; the Worker only runs for non-asset paths
# (e.g. POST /api/contact). A missing path renders public/404.html.
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "404-page"

# Non-secret defaults. Set RESEND_API_KEY as an encrypted secret:
#   npx wrangler secret put RESEND_API_KEY
# To persist leads, create a KV namespace and bind it as LEADS:
#   npx wrangler kv namespace create LEADS
# then add:
#   [[kv_namespaces]]
#   binding = "LEADS"
#   id = "<your-kv-namespace-id>"
[vars]
NOTIFY_TO = "contact@aevrium.com"
NOTIFY_FROM = "Aevrium Website <noreply@aevrium.com>"
