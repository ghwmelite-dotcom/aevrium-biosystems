name: Deploy to cPanel

# Publishes the aevrium.com site (/apex -> public_html) to Namecheap cPanel
# over FTPS on every push to main. The former investor.aevrium.com target
# (/public) was decommissioned.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cpanel
  cancel-in-progress: true

jobs:
  deploy-apex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync /apex to aevrium.com (public_html) via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./apex/
          server-dir: /public_html/
          # NOT clean-slate: leaves .well-known (AutoSSL), cgi-bin, and any
          # hand-placed server files untouched.
          state-name: .ftp-deploy-apex-state.json
          exclude: |
            **/config.php
            **/.DS_Store
            **/Thumbs.db
